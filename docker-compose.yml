services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis

  worker:
    build: .
    command: celery -A app.workers.celery_app worker --loglevel=INFO -Q aviation,provisioning,ingestion,normalization,scoring,cache,notifications,direct_mail,billing,analytics,admin,freight
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis

  beat:
    build: .
    command: celery -A app.workers.celery_app beat --loglevel=INFO
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: zerohour
      POSTGRES_PASSWORD: zerohour
      POSTGRES_DB: zerohour
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
